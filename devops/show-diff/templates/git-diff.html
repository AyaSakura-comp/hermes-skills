<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git Diff Review</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    padding: 24px;
    line-height: 1.5;
  }
  .header {
    margin-bottom: 24px;
    padding: 20px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
  }
  .header h1 {
    color: #58a6ff;
    font-size: 24px;
    margin-bottom: 8px;
  }
  .header .meta {
    color: #8b949e;
    font-size: 14px;
  }
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .stat-card .label {
    font-size: 12px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-card .value {
    font-size: 24px;
    font-weight: 600;
    margin-top: 4px;
  }
  .stat-card .value.files { color: #58a6ff; }
  .stat-card .value.added { color: #3fb950; }
  .stat-card .value.removed { color: #f85149; }
  .file-group {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .file-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: #1c2128;
    border-bottom: 1px solid #30363d;
    cursor: pointer;
    user-select: none;
  }
  .file-header:hover {
    background: #22272e;
  }
  .file-header h2 {
    font-size: 15px;
    color: #e6edf3;
  }
  .file-header .badge {
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 12px;
    font-weight: 500;
    background: #1f6feb33;
    color: #58a6ff;
    border: 1px solid #1f6feb66;
  }
  .file-diff {
    padding: 0;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .file-diff.open {
    max-height: 10000px;
  }
  .file-diff pre {
    padding: 16px;
    margin: 0;
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre;
    tab-size: 2;
    overflow-x: auto;
  }
  .diff-header { color: #8b949e; }
  .diff-hunk { color: #8b949e; }
  .diff-add { background: #23863620; color: #7ee787; display: block; }
  .diff-del { background: #f8514920; color: #ff7b72; display: block; }
  .diff-plain { color: #c9d1d9; display: block; }
  .diff-sign {
    display: inline-block;
    width: 20px;
    color: #484f58;
  }
  .diff-add .diff-sign { color: #3fb950; }
  .diff-del .diff-sign { color: #f85149; }
  .footer {
    text-align: center;
    margin-top: 32px;
    padding: 16px;
    color: #484f58;
    font-size: 12px;
  }
  .btn {
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    margin: 0 4px;
    transition: background 0.2s;
  }
  .btn:hover { background: #30363d; }
</style>
<script>
function toggleFile(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}
</script>
</head>
<body>
<div class="header">
  <h1>📋 Git Diff Review</h1>
  <div class="meta">{{GENERATED_AT}}</div>
</div>
<div class="summary">
  <div class="stat-card">
    <div class="label">Files Changed</div>
    <div class="value files">{{FILE_COUNT}}</div>
  </div>
  <div class="stat-card">
    <div class="label">Lines Added</div>
    <div class="value added">{{LINES_ADDED}}</div>
  </div>
  <div class="stat-card">
    <div class="label">Lines Removed</div>
    <div class="value removed">{{LINES_REMOVED}}</div>
  </div>
</div>
{{FILE_SECTIONS}}
<div class="footer">
  <button class="btn" onclick="window.print()">🖨️ Print</button>
  <button class="btn" onclick="downloadDiff()">📥 Download Diff</button>
</div>
<script>
function downloadDiff() {
  const diffText = `{{RAW_DIFF}}`;
  const blob = new Blob([diffText], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'git-diff.patch';
  a.click();
  URL.revokeObjectURL(url);
}
// Open all file sections by default
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.file-diff').forEach(el => el.classList.add('open'));
});
</script>
</body>
</html>
